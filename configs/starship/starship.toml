"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$directory\
${custom.jj}"""

right_format = """$time"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
color_fg0 = '#1e1e2e'
color_fg1 = '#cdd6f4'
color_bg1 = '#313244'
color_bg3 = '#585b70'
color_blue = '#89b4fa'
color_aqua = '#94e2d5'
color_green = '#a6e3a1'
color_orange = '#fab387'
color_purple = '#cba6f7'
color_red = '#f38ba8'
color_yellow = '#f9e2af'

[os]
disabled = false
style = "fg:color_blue"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "fg:color_orange"
style_root = "fg:color_orange"
format = '[ $user ]($style)'

[directory]
style = "fg:color_blue"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[nodejs]
symbol = ""
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[c]
symbol = " "
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[cpp]
symbol = " "
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[rust]
symbol = ""
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[golang]
symbol = ""
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[php]
symbol = ""
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[java]
symbol = ""
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[kotlin]
symbol = ""
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[haskell]
symbol = ""
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[python]
symbol = ""
style = "fg:color_blue"
format = '[ $symbol( $version) ]($style)'

[docker_context]
symbol = ""
style = "fg:color_bg3"
format = '[ $symbol( $context) ]($style)'

[conda]
style = "fg:color_bg3"
format = '[ $symbol( $environment) ]($style)'

[pixi]
style = "fg:color_bg3"
format = '[ $symbol( $version)( $environment) ]($style)'

[time]
disabled = false
time_format = "%I:%M"
utc_time_offset = "America/Los_Angeles"
style = "fg:color_yellow"
format = '[  $time ]($style)'

[fill]
symbol = " "

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'

# Disable git modules in favor of jj-starship
[git_branch]
disabled = true

[git_status]
disabled = true

# Jujutsu VCS integration using jj-starship
# Replaces git_branch and git_status with unified JJ/Git support
[custom.jj]
command = "jj-starship --no-color --no-jj-prefix --no-git-prefix --no-jj-id --no-jj-status --no-git-id --no-git-status | sed 's/[()]//g; s/~[0-9]*//'"
detect_folders = [".jj", ".git"]
shell = ["sh"]
style = "fg:color_green"
format = '[ 󰘬 $output ]($style)'
